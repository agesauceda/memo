<!-- Toasts globales -->
<div class="toast-container position-fixed bottom-0 start-50 translate-middle-x p-3 d-flex flex-column gap-2">
    <div id="toastAvatarGuardado" class="toast avatar-toast align-items-center border-0" role="alert" aria-live="assertive" aria-atomic="true">
        <div class="toast-body d-flex align-items-center">
            <i class="fas fa-check-circle me-2" style="color: var(--mint);"></i>
            ¡Avatar actualizado correctamente!
        </div>
    </div>

    <div id="toastRegistroOk" class="toast avatar-toast align-items-center border-0" role="alert" aria-live="assertive" aria-atomic="true">
        <div class="toast-body d-flex align-items-center">
            <i class="fas fa-check-circle me-2" style="color: var(--mint);"></i>
            ¡Registro completado!
        </div>
    </div>

    <div id="toastLoginOk" class="toast avatar-toast align-items-center border-0" role="alert" aria-live="assertive" aria-atomic="true">
        <div class="toast-body d-flex align-items-center">
            <i class="fas fa-check-circle me-2" style="color: var(--mint);"></i>
            ¡Inicio de sesión exitoso!
        </div>
    </div>

    <div id="toastLogoutOk" class="toast avatar-toast align-items-center border-0" role="alert" aria-live="assertive" aria-atomic="true">

            <i class="fas fa-check-circle me-2" style="color: var(--mint);"></i>
            ¡Has salido de tu sesión!
        </div>
    </div>

    <div id="toastResetOk" class="toast avatar-toast align-items-center border-0" role="alert" aria-live="assertive" aria-atomic="true">
        <div class="toast-body d-flex align-items-center">
            <i class="fas fa-check-circle me-2" style="color: var(--mint);"></i>

        </div>
    </div>
    <div id="toastCuentaEliminada" class="toast avatar-toast align-items-center border-0" role="alert" aria-live="assertive" aria-atomic="true">
        <div class="toast-body d-flex align-items-center">
            <i class="fas fa-check-circle me-2" style="color: var(--mint);"></i>
            ¡Cuenta eliminada correctamente!
        </div>
    </div>
